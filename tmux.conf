##### Terminal & Colors (Kitty) ###############################################
# Prefer tmux-256color if your system has it (check with: infocmp tmux-256color)
set -g default-terminal "tmux-256color"

# Advertise truecolor to tmux/apps (modern flag)
set -as terminal-overrides ",*:RGB"

set -s extended-keys always
set -as terminal-features 'xterm*:extkeys'

##### Core Behavior ###########################################################
set -g set-clipboard on          # copy to system clipboard
set -g mouse on                  # enable mouse support
set -g status-interval 3         # update status bar every 3s
set -g detach-on-destroy off     # don't exit tmux when last client detaches
set -g status-position top       # move status bar to top

##### Prefix & Reload #########################################################
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

unbind r
bind r source-file "$HOME/.config/tmux/tmux.conf" \; display-message "tmux.conf reloaded"

##### Session helper ##########################################################
# Ctrl-d: create or attach to a 'docker-vm' session running ssh docker
bind-key C-d new-session -Ad -s docker-vm "ssh docker"

##### Navigation ##############################################################
# Vim-style pane selection
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Start indices at 1 and keep windows renumbered
set -g base-index 1
set -g pane-base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# Alt + arrows to move between panes (no prefix)
bind -n M-Left  select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up    select-pane -U
bind -n M-Down  select-pane -D

# Shift + arrows to switch windows
bind -n S-Left  previous-window
bind -n S-Right next-window

# Alt + Shift + H/L to switch windows
bind -n M-H previous-window
bind -n M-L next-window

unbind .
bind-key . command-prompt -p "swap current window with index:" "swap-window -t '%%'"

##### Theme / Plugin Options ##################################################
#set -g @catppuccin_flavour 'mocha'
set -g @tokyo-night-tmux_show_datetime 0
set -g @tokyo-night-tmux_show_path 1
set -g @tokyo-night-tmux_path_format relative
set -g @tokyo-night-tmux_window_id_style dsquare
set -g @tokyo-night-tmux_show_git 1

#set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-restore 'on'
set -g @resurrect-processes 'ssh'

##### TPM Plugins #############################################################
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'christoomey/vim-tmux-navigator'
#set -g @plugin 'dreamsofcode-io/catppuccin-tmux'
set -g @plugin 'janoamaral/tokyo-night-tmux'

##### Copy Mode (vi) ##########################################################
setw -g mode-keys vi
bind-key -T copy-mode-vi v  send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y  send-keys -X copy-selection-and-cancel

##### Create panes/windows in current directory ###############################
bind '"' split-window -v -c "#{pane_current_path}"
bind %   split-window -h -c "#{pane_current_path}"
bind c   new-window         -c "#{pane_current_path}"

# Bootstrap TPM if missing, then initialize it
if-shell '[ ! -d "$HOME/.tmux/plugins/tpm" ]' 'run-shell "git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm"'
run '~/.tmux/plugins/tpm/tpm'

# Clear the terminal in the pane, reset terminal state, then ask tmux to redraw
bind-key -n C-l if-shell "$is_vim" "send-keys C-l" "send-keys C-l; refresh-client"
